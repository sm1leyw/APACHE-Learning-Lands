<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Battle Mode!</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="battle.css">
</head>
<body>

  <div class="game-container" id="gameScreen">
    
    <div class="hud-top">
      <div class="hp-box">
        <span class="hp-label">HP:</span>
        <span id="heart-container" class="hearts">❤️❤️❤️</span>
      </div>
      <div class="boss-name">บอสมังกรไฟ Lv.99</div>
    </div>

    <div class="battle-arena">
      <img id="boss-sprite" class="monster idle" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/6.gif" alt="Charizard">
    </div>

    <div class="ui-bottom">
      
      <div id="dialogue-box" class="dialogue-box" onclick="nextDialogue()">
        <p id="dialogue-text">เจ้ามนุษย์! คิดว่าจะผ่านด่านนี้ไปได้งั้นรึ?</p>
        <span class="blinking-cursor">▼</span>
      </div>

      <div id="quiz-box" class="quiz-box hidden">
        <p id="question-text" class="question">ข้อใดคือภาษาที่ใช้จัดรูปแบบหน้าเว็บ?</p>
        
        <div class="choices-grid">
          <button class="choice-btn" onclick="checkAnswer(false)">A. HTML</button>
          <button class="choice-btn" onclick="checkAnswer(true)">B. CSS</button>
          <button class="choice-btn" onclick="checkAnswer(false)">C. Python</button>
          <button class="choice-btn" onclick="checkAnswer(false)">D. Java</button>
        </div>
      </div>

    </div>
  </div>

  <script src="battle.js"></script>
</body>
</html>
