<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1thaisubject</title>
    <link rel="stylesheet" href="1thaisubject.css">
</head>
<body>

    <!-- ===== MAP (หน้าเริ่ม) ===== -->
    <div id="map-screen" class="screen active">
        <div class="map-header">
            <a href="0subject.html" class="back-btn">⬅ กลับ</a>
            <h2 id="map-title" class="map-title-text">แผนที่ผจญภัย</h2>
        </div>
        
        <div class="map-area">
            <svg id="path-svg" class="path-svg"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <!-- ===== GAME ===== -->
    <div id="game-screen" class="screen">
        <div class="game-container">

            <div class="game-header">
                <button class="back-btn" onclick="returnToMap()">⬅ กลับแผนที่</button>
                <h2 id="level-title">ด่านที่ 1</h2>
                <div class="hearts" id="hearts-display">❤️❤️❤️</div>
            </div>

            <div id="boss-ui" class="boss-zone" style="display: none;">
                <h2 class="boss-name">🔥 BOSS 🔥</h2>
                <div class="boss-img">😈</div>
                <p class="boss-quote">"เข้ามาเลย!"</p>
            </div>

            <div class="question-box">
                <h3 id="question-text">คำถามจะขึ้นตรงนี้</h3>
            </div>

            <div class="choices-grid" id="choices-container"></div>

        </div>
    </div>

    <script src="1thaisubject.js"></script>
</body>
</html>
