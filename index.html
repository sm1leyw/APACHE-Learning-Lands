<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APACHE Learning Land</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', Tahoma, sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: white;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
        }

        /* ================= Menu Screen ================= */
        #menu-screen {
            position: relative;
            background-color: #1a1a2e;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.6;
        }

        .menu-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5vw;
            width: 100%;
            height: 100%;
        }

        .characters {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .char-box {
            width: 100px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed #aaa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-top: -50px;
        }

        .magic-book {
            font-size: 120px;
            text-shadow: 0 0 30px #00ffff;
            z-index: 2;
            pointer-events: none;
        }

        .hologram-container {
            position: relative;
            margin-bottom: -40px;
            animation: float 3s ease-in-out infinite;
        }

        .hologram-base {
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 100px solid rgba(0, 255, 255, 0.25);
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(8px);
            z-index: 0;
            pointer-events: none;
        }

        .hologram-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: rgba(0, 40, 70, 0.7);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        .subject-btn {
            width: 130px;
            height: 130px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .subject-btn .icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .subject-btn.unlocked:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ffff;
        }

        .subject-btn.locked {
            border-color: #555;
            color: #888;
            background: rgba(0, 0, 0, 0.8);
            cursor: not-allowed;
        }

        .subject-btn.locked .icon {
            filter: grayscale(100%);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* ================= Map Screen (เปลี่ยนเป็นรูปลายแทงแล้ว!) ================= */
        #map-screen {
            flex-direction: column;
            /* ดึงภาพกระดาษแผนที่มาใช้ */
            background: url('bg-selecttor/apachebackground_thai.png') no-repeat center center;
            background-size: cover;
        }

        /* ปรับกรอบเมนูแผนที่ให้เข้ากับสีกระดาษ */
        .map-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(139, 69, 19, 0.8);
            z-index: 10;
            border-bottom: 3px solid #f1c40f;
        }

        .map-title-text {
            color: #f1c40f;
            text-shadow: 0 0 10px #000;
            font-size: 28px;
        }

        .progress-badge {
            background: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .map-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            overflow: hidden;
        }

        .path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* โหนดด่านแผนที่ */
        .stage-node {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            background: #f1c40f;
            border: 4px solid #e67e22;
            color: #8e44ad;
        }

        .stage-node::after {
            content: attr(data-label);
            position: absolute;
            bottom: -30px;
            font-size: 16px;
            white-space: nowrap;
            color: #333;
            text-shadow: 1px 1px 2px white;
            font-weight: bold;
        }

        .stage-node.locked {
            background: #7f8c8d;
            border-color: #2c3e50;
            color: #bdc3c7;
            cursor: not-allowed;
        }

        .stage-node.current {
            background: #00a8ff;
            border-color: #fbc531;
            color: white;
            cursor: pointer;
            animation: bounce 1.5s infinite;
            box-shadow: 0 0 20px #00a8ff;
        }

        .stage-node.passed {
            background: #2ed573;
            border-color: #ffffff;
            color: white;
            cursor: pointer;
        }

        .stage-node.boss {
            width: 90px;
            height: 90px;
            background: #ff4757;
            border: 5px solid yellow;
            color: white;
            font-size: 35px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -60%) scale(1.1);
            }
        }

        /* ================= Game Screen ================= */
        #game-screen {
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .game-container {
            width: 90%;
            max-width: 800px;
            background: rgba(30, 60, 114, 0.9);
            border: 4px solid #00ffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .hearts {
            font-size: 28px;
            letter-spacing: 5px;
        }

        .boss-zone {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            border: 2px solid #ff4757;
        }

        .boss-name {
            color: #ff4757;
            text-shadow: 0 0 10px red;
        }

        .boss-img {
            font-size: 60px;
            margin: 10px 0;
        }

        .boss-quote {
            color: yellow;
            font-style: italic;
            font-weight: bold;
        }

        .question-box {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            font-size: 26px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .tts-btn {
            position: absolute;
            top: -20px;
            right: 20px;
            background: #ffaa00;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            font-size: 16px;
        }

        .tts-btn:hover {
            background: #e69500;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .choice-btn {
            padding: 20px;
            font-size: 20px;
            background: #2ed573;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            box-shadow: 0 5px #26ae60;
        }

        .choice-btn:hover {
            background: #26ae60;
            transform: translateY(-3px);
        }

        .choice-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0;
        }

        .speech-zone {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            border: 2px dashed yellow;
        }

        .mic-btn {
            font-size: 24px;
            padding: 15px 40px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px red;
            transition: 0.3s;
            font-weight: bold;
        }

        .mic-btn.recording {
            background: #ff0000;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 0, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0;
            }
        }
    </style>
</head>

       function buildMap() {
    const container = document.getElementById('nodes-container');
    const svg = document.getElementById('path-svg');
    container.innerHTML = "";
    svg.innerHTML = "";

    const mapArea = document.getElementById('map-area');
    const width = mapArea.clientWidth;
    const height = mapArea.clientHeight;

    document.getElementById('current-save').innerText =
        currentSubject === "english" ? userProgress.english : userProgress.thai;

    let pathD = "";
    const levels = currentSubject === "english" ? englishLevels : thaiLevels;
    const progress = currentSubject === "english" ? userProgress.english : userProgress.thai;

    levels.forEach((lvl, index) => {
        const pos = mapPositions[index];

        const pixelX = (pos.x / 100) * width;
        const pixelY = (pos.y / 100) * height;

        if (index === 0) pathD += `M ${pixelX} ${pixelY} `;
        else pathD += `L ${pixelX} ${pixelY} `;

        const btn = document.createElement('div');
        btn.className = 'stage-node';
        btn.style.left = `${pos.x}%`;
        btn.style.top = `${pos.y}%`;
        btn.setAttribute('data-label', lvl.isBoss ? "BOSS" : `ด่าน ${lvl.id}`);

        if (lvl.id < progress) {
            btn.classList.add('passed');
            btn.innerHTML = "⭐";
            btn.onclick = () => startLevel(index);

        } else if (lvl.id === progress) {
            btn.classList.add('current');
            btn.innerHTML = lvl.isBoss ? "😈" : lvl.id;

            if (lvl.isBoss) btn.classList.add('boss');

            btn.onclick = () => startLevel(index);

        } else {
            btn.classList.add('locked');
            btn.innerHTML = "🔒";

            btn.onclick = () => alert("ด่านถูกล็อก!");

            if (lvl.isBoss) {
                btn.classList.add('boss');
                btn.innerHTML = "😈";
            }
        }

        container.appendChild(btn);
    });

    svg.innerHTML = `<path d="${pathD}" fill="none" stroke="#5c2a16" stroke-width="5" stroke-dasharray="12, 10" stroke-linecap="round" stroke-linejoin="round" />`;
}

        // ผูกอีเวนต์ ถ้ามีการย่อ/ขยายหน้าจอ ให้วาดเส้นใหม่เพื่อไม่ให้เส้นเบี้ยว
        window.addEventListener('resize', () => {

                buildMap();

        // ================= ระบบเกม & เสียง (Web Speech API) =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'th-TH';
            recognition.continuous = false;
        }

        function startLevel(index) {
            playingLevelIndex = index;
            hearts = 3;
            updateHearts();
            currentQuestionIndex = 0;

            const levels = currentSubject === "english" ? englishLevels : thaiLevels;
            const lvl = levels[playingLevelIndex];

            document.getElementById('level-title').innerText =
                `ด่าน ${lvl.id} - ${lvl.title}`;

            const bossUI = document.getElementById('boss-ui');
            const gameBoard = document.querySelector('.game-container');

            if (lvl.isBoss) {
                bossUI.style.display = 'block';
                gameBoard.style.border = "4px solid #ff4757";
            } else {
                bossUI.style.display = 'none';
                gameBoard.style.border = "4px solid #00ffff";
            }

            showScreen('game-screen');
            renderQuestion();
        }

        function updateHearts() { document.getElementById('hearts-display').innerText = "❤️".repeat(hearts); }

        function renderQuestion() {
            if (currentQuestionIndex >= 10) { handleLevelComplete(); return; }

            const levels = currentSubject === "english" ? englishLevels : thaiLevels;
            const q = levels[playingLevelIndex].questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = `ข้อ ${currentQuestionIndex + 1}: ` + q.q;

            const ttsBtn = document.getElementById('btn-speak-q');
            if (q.tts) {
                ttsBtn.style.display = 'block';
                speakQuestion();
            } else {
                ttsBtn.style.display = 'none';
            }

            const choicesBox = document.getElementById('choices-container');
            const speechBox = document.getElementById('speech-container');

            if (q.type === 'choice') {
                speechBox.style.display = 'none';
                choicesBox.style.display = 'grid';
                choicesBox.innerHTML = "";
                q.choices.forEach((choice, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn'; btn.innerText = choice;
                    btn.onclick = () => checkAnswer(index === q.ans);
                    choicesBox.appendChild(btn);
                });
            } else if (q.type === 'speech') {
                choicesBox.style.display = 'none';
                speechBox.style.display = 'block';
                document.getElementById('speech-result').innerText = "";
            }
        }

        function speakQuestion() {
            const levels = currentSubject === "english" ? englishLevels : thaiLevels;
            const q = levels[playingLevelIndex].questions[currentQuestionIndex];
            if (q.tts) {
                const utterance = new SpeechSynthesisUtterance(q.tts);
                utterance.lang = 'th-TH';
                speechSynthesis.speak(utterance);
            }
        }

        function startRecording() {
            if (!recognition) { alert("เบราว์เซอร์ไม่รองรับระบบไมโครโฟน แนะนำให้ใช้ Google Chrome ครับ"); return; }

            const micBtn = document.getElementById('btn-mic');
            micBtn.classList.add('recording');
            micBtn.innerText = "กำลังฟัง...";

            recognition.start();

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('speech-result').innerText = `น้องพูดว่า: "${transcript}"`;
                micBtn.classList.remove('recording');
                micBtn.innerText = "🎤 กดเพื่อพูดใหม่";

                const levels = currentSubject === "english" ? englishLevels : thaiLevels;
                const q = levels[playingLevelIndex].questions[currentQuestionIndex];
                if (transcript.includes(q.ansText)) {
                    setTimeout(() => checkAnswer(true), 1500);
                } else {
                    setTimeout(() => checkAnswer(false), 1500);
                }
            };

            recognition.onerror = function (event) {
                micBtn.classList.remove('recording');
                micBtn.innerText = "🎤 กดเพื่อพูด";

                // เช็กว่าพังเพราะอะไร แล้วแจ้งเตือนให้ตรงจุด
                if (event.error === 'not-allowed') {
                    alert("⚠️ เบราว์เซอร์บล็อกไมค์อยู่ครับ! อย่าลืมกดอนุญาตการใช้ไมค์ที่มุมขวาบน หรือต้องเปิดผ่าน Live Server (localhost) นะครับ");
                } else if (event.error === 'no-speech') {
                    alert("ไม่ได้ยินเสียงเลย ลองพูดให้ดังขึ้น หรือขยับเข้าใกล้ไมค์อีกนิดนะ!");
                } else if (event.error === 'network') {
                    alert("⚠️ ฟังก์ชันนี้ต้องต่ออินเทอร์เน็ตเพื่อแปลงเสียงเป็นข้อความครับ ลองเช็กเน็ตดูนะ!");
                } else {
                    alert("เกิดข้อผิดพลาดกับไมโครโฟน: " + event.error);
                }
            };
        }

        function checkAnswer(isCorrect) {
            if (isCorrect) {

                renderQuestion();

                hearts--; updateHearts();
                if (hearts <= 0) {
                    setTimeout(() => {
                        alert("💔 หัวใจหมดแล้ว!! น้องๆ โดนมอนสเตอร์ตีกลับไปจุดเริ่มต้น ต้องเริ่มลุยด่าน 1 ใหม่ทั้งหมดเลยนะ!");
