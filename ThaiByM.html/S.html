<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai RPG Quiz</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle,#020617,#0f172a);
  color:white;
}

/* ===== MAP ===== */
#map {
  position:relative;
  height:100vh;
}

.stage {
  position:absolute;
  width:70px;height:70px;
  border-radius:50%;
  display:flex;justify-content:center;align-items:center;
  background:linear-gradient(#1e293b,#334155);
  box-shadow:0 0 15px #38bdf8;
  cursor:pointer;
  transition:.3s;
  font-weight:bold;
}

.stage:hover { transform:scale(1.2); }

.locked {
  background:#444;
  box-shadow:none;
  cursor:not-allowed;
}

.boss {
  background:red;
  box-shadow:0 0 25px red;
}

/* ===== GAME ===== */
#game {
  display:none;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,.5);
}

.choice {
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
  transition:.2s;
}

.choice:hover { background:#38bdf8; }

.choice.active {
  background:#22c55e;
}

button.main {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  cursor:pointer;
}

/* ===== HP ===== */
.hp-bar {
  height:10px;
  background:#444;
  border-radius:10px;
  margin:10px 0;
}
.hp-fill {
  height:100%;
  background:lime;
  border-radius:10px;
}

/* ===== POPUP ===== */
#popup {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.7);
}
.popup-box {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  text-align:center;
  animation:pop .3s;
}
@keyframes pop { from{transform:scale(.6)} to{transform:scale(1)} }

</style>
</head>

<body>

<div id="map"></div>

<div id="game">
  <div class="card">
    <h2 id="stageTitle"></h2>
    <p id="progress"></p>

    <div class="hp-bar"><div id="hpFill" class="hp-fill"></div></div>

    <h3 id="question"></h3>

    <div id="choices"></div>

    <button class="main" onclick="submitAnswer()">⚔️ ตอบ</button>
  </div>
</div>

<div id="popup">
  <div class="popup-box">
    <h2 id="popupText"></h2>
    <button onclick="closePopup()">ตกลง</button>
  </div>
</div>

<script>

/* ===== STATE ===== */
let hp,maxHP,current,questions,selected=null,unlocked=0,stageIndex;

/* ===== DATA (ช้อยทั้งหมด) ===== */
const data = [
{
name:"ตัวสะกด",
q:[
{q:"คำว่า 'แมว' ใช้ตัวสะกดใด",choices:["ว","น","ม"],a:"ว"},
{q:"ข้อใดสะกดถูกต้อง",choices:["สบายดี","สบายดี์","สบายดี๊"],a:"สบายดี"}
]
},
{
name:"การฟัง",
q:[
{q:"ถ้าฟังไม่เข้าใจควรทำอย่างไร",choices:["ถามครู","เงียบ","เล่นมือถือ"],a:"ถามครู"},
{q:"การฟังที่ดีคืออะไร",choices:["ตั้งใจฟัง","คุย","หลับ"],a:"ตั้งใจฟัง"}
]
},
{
name:"การอ่าน",
q:[
{q:"การอ่านช่วยอะไร",choices:["เข้าใจ","ง่วง","เสียเวลา"],a:"เข้าใจ"},
{q:"คำว่า 'โรงเรียน' อ่านว่าอะไร",choices:["โรง-เรียน","โลง-เรียน","โรง-เลียน"],a:"โรง-เรียน"}
]
},
{
name:"คำกริยา",
q:[
{q:"คำว่า 'วิ่ง' คืออะไร",choices:["กริยา","นาม","สรรพนาม"],a:"กริยา"},
{q:"ข้อใดเป็นคำกริยา",choices:["กิน","บ้าน","ฉัน"],a:"กิน"}
]
}
];

/* ===== BOSS ===== */
const bossStage = {
name:"👾 BOSS",
q:[
{q:"ข้อใดเป็นคำนาม",choices:["แมว","วิ่ง","เขา"],a:"แมว"},
{q:"ข้อใดเป็นคำควบกล้ำ",choices:["กล้วย","มา","ไป"],a:"กล้วย"}
]
};

/* ===== MAP ===== */
const pos=[[10,70],[30,50],[50,70],[70,50]];

function renderMap(){
  let map=document.getElementById("map");
  map.innerHTML="";

  data.forEach((s,i)=>{
    let d=document.createElement("div");
    d.className="stage";
    d.innerText=i+1;
    d.style.left=pos[i][0]+"%";
    d.style.top=pos[i][1]+"%";

    if(i>unlocked)d.classList.add("locked");

    d.onclick=()=>{ if(i<=unlocked) startStage(i); };

    map.appendChild(d);
  });

  if(unlocked>=data.length){
    let b=document.createElement("div");
    b.className="stage boss";
    b.innerText="👾";
    b.style.left="45%";
    b.style.top="15%";
    b.onclick=startBoss;
    map.appendChild(b);
  }
}
renderMap();

/* ===== GAME ===== */
function startStage(i){
  stageIndex=i;
  questions=data[i].q;
  startGame(3);
}
function startBoss(){
  questions=bossStage.q;
  startGame(5);
}
function startGame(hpVal){
  hp=maxHP=hpVal;
  current=0;

  document.getElementById("map").style.display="none";
  document.getElementById("game").style.display="flex";

  showQuestion();
}

/* ===== QUESTION ===== */
function showQuestion(){
  selected=null;

  let q=questions[current];

  document.getElementById("stageTitle").innerText="ด่าน: "+(stageIndex+1 || "Boss");
  document.getElementById("progress").innerText=`${current+1}/${questions.length}`;
  document.getElementById("question").innerText=q.q;

  let cDiv=document.getElementById("choices");
  cDiv.innerHTML="";

  q.choices.forEach(c=>{
    let btn=document.createElement("button");
    btn.className="choice";
    btn.innerText=c;

    btn.onclick=()=>{
      selected=c;
      document.querySelectorAll(".choice").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
    };

    cDiv.appendChild(btn);
  });

  updateHP();
}

/* ===== ANSWER ===== */
function submitAnswer(){
  if(!selected) return showPopup("⚠️ เลือกคำตอบก่อน");

  let q=questions[current];

  if(selected===q.a){
    current++;
    if(current>=questions.length){
      unlocked++;
      showPopup("🏆 ผ่านด่าน!","win");
    } else {
      showPopup("✅ ถูกต้อง","next");
    }
  } else {
    hp--;
    if(hp<=0){
      showPopup("💀 Game Over","lose");
    } else {
      showPopup("❌ ผิด ลองใหม่","retry");
    }
  }
}

/* ===== POPUP ===== */
let popupMode="";
function showPopup(text,mode=""){
  popupMode=mode;
  document.getElementById("popupText").innerText=text;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";

  if(popupMode==="win"){
    document.getElementById("game").style.display="none";
    document.getElementById("map").style.display="block";
    renderMap();
  }
  else if(popupMode==="lose"){
    location.reload();
  }
  else showQuestion();
}

/* ===== HP ===== */
function updateHP(){
  let percent=(hp/maxHP)*100;
  let bar=document.getElementById("hpFill");
  bar.style.width=percent+"%";

  if(percent<50) bar.style.background="orange";
  if(percent<25) bar.style.background="red";
}

</script>

</body>
</html>
