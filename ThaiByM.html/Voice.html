<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกมตอบคำถามด้วยเสียง</title>
  <style>
    body {
      font-family: "Prompt", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 20px;
    }

    #question {
      font-size: 20px;
      margin: 20px 0;
    }

    #result {
      font-size: 18px;
      margin-top: 20px;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
      transition: 0.3s;
    }

    .mic {
      background: #ff4d4d;
      color: white;
    }

    .mic:hover {
      background: #ff1a1a;
    }

    .next {
      background: #00c853;
      color: white;
    }

    .next:hover {
      background: #00a844;
    }

    #answerText {
      margin-top: 15px;
      color: #ffd;
    }

    #score {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>🎤 เกมตอบคำถามด้วยเสียง</h1>

  <div id="question">กำลังโหลด...</div>

  <button class="mic" onclick="startListening()">🎤 พูดคำตอบ</button>
  <button class="next" onclick="nextQuestion()">➡️ ข้อถัดไป</button>

  <div id="answerText"></div>
  <div id="result"></div>
  <div id="score">คะแนน: 0</div>
</div>

<script>
  const questions = [
    {
      q: "เมืองหลวงของประเทศไทยคืออะไร",
      answers: ["กรุงเทพ", "กรุงเทพมหานคร"]
    },
    {
      q: "2 บวก 2 เท่ากับเท่าไร",
      answers: ["4", "สี่"]
    },
    {
      q: "สัตว์ที่บินได้มีอะไร",
      answers: ["นก", "เครื่องบิน","โต๋"] // รับได้หลายคำ
    }
  ];

  let current = 0;
  let score = 0;

  const questionEl = document.getElementById("question");
  const resultEl = document.getElementById("result");
  const answerTextEl = document.getElementById("answerText");
  const scoreEl = document.getElementById("score");

  function loadQuestion() {
    questionEl.innerText = questions[current].q;
    resultEl.innerText = "";
    answerTextEl.innerText = "";
  }

  function nextQuestion() {
    current++;
    if (current >= questions.length) {
      questionEl.innerText = "🎉 จบเกมแล้ว!";
      resultEl.innerText = "";
      return;
    }
    loadQuestion();
  }

  function startListening() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("เบราว์เซอร์ไม่รองรับการใช้ไมโครโฟน");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "th-TH";
    recognition.start();

    recognition.onstart = () => {
      resultEl.innerText = "🎧 กำลังฟัง...";
    };

    recognition.onresult = (event) => {
      const speech = event.results[0][0].transcript;
      answerTextEl.innerText = "คุณพูดว่า: " + speech;

      checkAnswer(speech);
    };

    recognition.onerror = () => {
      resultEl.innerText = "❌ เกิดข้อผิดพลาด";
    };
  }

  function checkAnswer(speech) {
    const correctAnswers = questions[current].answers;

    const isCorrect = correctAnswers.some(ans => 
      speech.includes(ans)
    );

    if (isCorrect) {
      resultEl.innerText = "✅ ถูกต้อง!";
      score++;
    } else {
      resultEl.innerText = "❌ ผิด!";
    }

    scoreEl.innerText = "คะแนน: " + score;
  }

  loadQuestion();
</script>

</body>
</html>
