<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Learning Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #1e3a8a;
            --light-blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: #ffffff; /* 👈 พื้นหลังขาว */
            min-height: 100vh;
            color: #1e3a8a;
            display: flex;
            flex-direction: column;
        }

        /* --- Navigation Bar --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--primary-blue); /* 👈 แบนเนอร์สีน้ำเงิน */
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            color: white; /* 👈 ตัวอักษรขาว */
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95rem;
            opacity: 0.85;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #c7d2fe;
        }

        /* --- Main Content --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- Video Box --- */
        .video-box {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        video {
            width: 100%;
            border-radius: 12px;
        }

        /* --- Buttons --- */
        .button-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 850px;
        }

        .subject-btn {
            background: white;
            color: var(--primary-blue);
            border: 2px solid #dbeafe;
            padding: 18px 10px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .subject-btn:hover {
            background: var(--light-blue);
            color: white;
            transform: translateY(-5px);
        }

        .subject-btn.active {
            background: var(--primary-blue);
            color: white;
            border: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .button-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }

    </style>
</head>

<body>

    <nav>
        <div class="logo">โลโก้เว็บเรา</div>
        <div class="nav-links">
            <a href="#">หน้าหลัก</a>
            <a href="#">เพิ่มความคิดเห็น</a>
        </div>
    </nav>

    <div class="main-container">

        <div class="video-box">
            <video controls autoplay muted loop>
                <source src="https://cdn.discordapp.com/attachments/1183793886724894801/1485224185054761050/users_2d9991a4-6753-4a03-b7db-b38142c5138f_generated_5023e460-b530-4b5d-9cb0-f2b740a9f410_generated_video.mov" type="video/mp4">
            </video>
        </div>

        <div class="button-group">
            <button class="subject-btn">ภาษาไทย</button>
            <button class="subject-btn">อังกฤษ</button>
            <button class="subject-btn active">วิทยาศาสตร์</button>
            <button class="subject-btn">คณิตศาสตร์</button>
        </div>

    </div>

</body>
</html>
