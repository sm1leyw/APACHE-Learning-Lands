<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>วิชาภาษาไทย | เรียนรู้แดนมหัศจรรย์</title>

    <link rel="stylesheet" href="CSS/game-common.css">
    <link rel="stylesheet" href="CSS/01thai.css">
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
</head>

<body>

    <!-- 🎬 โซนวิดีโอ (แสดงก่อนเริ่มเกม) -->
    <div id="video-zone" class="container-view hidden">

        <header class="zone-header">

            <!-- ปุ่มกลับ -->
            <button class="back-home-btn" onclick="backToMap()">
                <span>⬅</span> กลับหน้าด่าน
            </button>

            <!-- หัวข้อ -->
            <h1>แดนเรียนรู้วิชาภาษาไทย</h1>

            <!-- คำอธิบาย -->
            <p>ดูวิดีโอนี้เพื่อวอร์มอัพก่อนเข้าผจญภัย!</p>

        </header>

        <!-- วิดีโอ YouTube -->
        <div class="video-container">
            <iframe
                width="560"
                height="315"
                src="https://www.youtube-nocookie.com/embed/9Deg7VrpHbM?si=yjlr6UIxhKb-25uL"
                title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen>
            </iframe>
        </div>

        <!-- ปุ่มเริ่มเกม -->
        <button class="goto-quiz-btn" onclick="enterGame()">
            ฉันพร้อมผจญภัยแล้ว!
        </button>

    </div>

    <!-- 🎮 โซนเกม (Quiz + Map + UI ต่าง ๆ) -->
    <div id="quiz-zone" class="container-view">

        <!-- ================== HUD (แถบบนเกม) ================== -->
        <div class="game-hud">

            <!-- ปุ่มกลับหน้าหลัก -->
            <button class="back-video-btn" onclick="location.href='index.html'">
                <span>⬅</span> กลับหน้าหลัก
            </button>

            <!-- ชื่อด่าน -->
            <div id="current-stage-title">
                แผนที่ผจญภัย วิชาภาษาไทย
            </div>

            <!-- หัวใจ (ชีวิต) -->
            <div id="hearts-container" class="hearts-container">
                <div class="heart full" id="heart-1">❤️</div>
                <div class="heart full" id="heart-2">❤️</div>
                <div class="heart full" id="heart-3">❤️</div>
            </div>
        </div>

        <!-- ================== หน้าจอแผนที่ ================== -->
        <div id="map-screen" class="screen">
            <div class="map-container">

                <!-- เส้นทาง -->
                <svg id="path-svg" class="map-path-svg"></svg>

                <!-- จุดด่าน -->
                <div id="stages-layer" class="stages-layer"></div>
            </div>
        </div>

        <!-- ================== หน้าจอเกม ================== -->
        <div id="game-screen" class="screen hidden">

            <div class="question-layout">

                <!-- 🧑‍🏫 ตัวช่วย (NPC) -->
                <div class="guide-area">
                    <img src="ตัวละคร/Dreambull(Main).png"
                         alt="พี่ช้าง Dreambull"
                         class="dreambull-img">

                    <!-- กล่องคำพูด -->
                    <div class="bubble hint-bubble" id="hint-bubble">
                        สวัสดีจ้ะ! พี่ช้างจะคอยช่วยนะ
                    </div>
                </div>

                <!-- ❓ โซนคำถาม -->
                <div class="quiz-area">

                    <!-- ข้อมูลด่าน -->
                    <div class="stage-info">
                        ด่านที่ <span id="stage-num">X</span> :
                        <span id="stage-name">X</span>
                    </div>

                    <!-- ลำดับคำถาม -->
                    <div class="question-info">
                        ข้อที่ <span id="question-num">Y</span> /
                        <span id="total-questions">5</span>
                    </div>

                    <!-- กล่องคำถาม -->
                    <div class="question-box">
                        <p id="question-text">โจทย์กำลังโหลด...</p>
                    </div>

                    <!-- ตัวเลือก -->
                    <div class="options-container" id="options-container"></div>

                    <!-- input พิเศษ (ถ้ามี) -->
                    <div id="special-input-container" class="hidden">
                        <p class="special-instruction"></p>
                    </div>
                </div>

                <!-- 👾 ศัตรู / Boss -->
                <div class="progress-area">
                    <div id="boss-container" class="hidden">

                        <img src=""
                             alt="Boss"
                             id="boss-img"
                             class="boss-img">

                        <div class="bubble boss-bubble" id="boss-bubble">
                            ย้าก! รับมือ!
                        </div>

                        <div class="boss-name" id="boss-display-name">
                            TJ Robert
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================== หน้าจอจบเกม ================== -->
        <div id="end-overlay" class="overlay hidden">
            <div class="overlay-content">

                <!-- ไอคอน -->
                <div id="end-icon">🎉</div>

                <!-- หัวข้อ -->
                <h1 id="end-title">สุดยอดไปเลย!</h1>

                <!-- ข้อความ -->
                <p id="end-msg">คุณผ่านด่านแล้ว</p>

                <!-- ปุ่ม -->
                <div class="end-btns">
                    <button id="end-main-btn" onclick="resetToMap()">
                        กลับไปที่แผนที่
                    </button>

                    <button id="retry-btn"
                            class="hidden"
                            onclick="retryCurrentStage()">
                        เริ่มด่านนี้ใหม่
                    </button>
                </div>

            </div>
        </div>

    </div>

    <!-- ================== ICON (Font Awesome) ================== -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- ================== JavaScript ================== -->
    <script src="JS/thaiData.js"></script>     <!-- ข้อมูลคำถาม -->
    <script src="JS/gameEngine.js"></script>  <!-- ระบบเกม -->
    <script src="JS/01thai.js"></script>      <!-- Logic วิชาภาษาไทย -->

</body>
</html>
