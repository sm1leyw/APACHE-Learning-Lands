<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Learning Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003366;
            --light-blue: #00a8ff;
            --bg-gradient: linear-gradient(135deg, #001f3f 0%, #004080 100%);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* --- Navigation Bar --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95rem;
            opacity: 0.8;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--light-blue);
        }

        /* --- Main Content --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Video Container */
        .video-box {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            position: relative;
        }

        video {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        /* --- Button Group --- */
        .button-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 850px;
        }

        .subject-btn {
            background: rgba(0, 45, 88, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 10px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .subject-btn:hover {
            background: var(--light-blue);
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.3);
            border-color: var(--light-blue);
        }

        /* Highlight สำหรับปุ่มที่ถูกเลือก (ตามภาพตัวอย่าง) */
        .subject-btn.active {
            border: 2px solid #7d5fff;
            box-shadow: 0 0 15px rgba(125, 95, 255, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .button-group {
                grid-template-columns: repeat(2, 1fr);
            }
            .logo { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">โลโก้เว็บเรา</div>
        <div class="nav-links">
            <a href="#">หน้าหลัก</a>
            <a href="#">เพิ่มความคิดเห็น</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="video-box">
            <video controls autoplay muted loop>
                <source src="https://cdn.discordapp.com/attachments/1183793886724894801/1485224185054761050/users_2d9991a4-6753-4a03-b7db-b38142c5138f_generated_5023e460-b530-4b5d-9cb0-f2b740a9f410_generated_video.mov?ex=69c1164f&is=69bfc4cf&hm=1a84209f5247bb5d7d286ea8cb1cff3f33a1634d6af1684d22b763177249dc43&" type="video/mp4">
            </video>
        </div>

        <div class="button-group">
            <button class="subject-btn">ภาษาไทย</button>
            <button class="subject-btn">อังกฤษ</button>
            <button class="subject-btn active">วิทยาศาสตร์</button> <button class="subject-btn">คณิตศาสตร์</button>
        </div>
    </div>

</body>
</html>
